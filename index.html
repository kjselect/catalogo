<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJ Select — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --electric: #0057FF;
    --sky: #00AAFF;
    --orange: #FF6B00;
    --white: #F5F8FF;
    --metal: #C8D8F0;
    --dark: #080D1A;
    --darker: #050810;
    --card-bg: #0D1628;
    --border: rgba(0,170,255,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--darker); color: var(--white); font-family: 'Barlow', sans-serif; min-height:100vh; overflow-x:hidden; }

  /* HEADER */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(5,8,16,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
  }
  .header-inner {
    max-width:1200px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    height:80px; gap:16px;
  }

  /* LOGO — replica del letrero físico */
  .logo {
    display:flex; flex-direction:column; align-items:center;
    gap:0; text-decoration:none;
  }
  .logo-box {
    background: #0A0E1A;
    border: 2px solid #1A2A50;
    border-radius: 6px;
    padding: 8px 18px 4px;
    display:flex; flex-direction:column; align-items:center;
    box-shadow: 0 0 24px rgba(0,87,255,0.35), 0 0 6px rgba(0,170,255,0.2) inset;
    position:relative;
  }
  /* neon glow top bar */
  .logo-box::before {
    content:'';
    position:absolute; top:-2px; left:10%; width:80%; height:2px;
    background: linear-gradient(90deg, transparent, var(--sky), var(--orange), var(--sky), transparent);
    border-radius:2px;
    box-shadow: 0 0 8px var(--sky);
  }
  .logo-letters {
    display:flex; align-items:baseline; gap:0;
    font-family:'Bebas Neue'; font-size:38px; letter-spacing:4px; line-height:1;
  }
  .logo-k { color: var(--sky); text-shadow: 0 0 12px rgba(0,170,255,0.8), 0 0 24px rgba(0,170,255,0.4); }
  .logo-j { color: var(--orange); text-shadow: 0 0 12px rgba(255,107,0,0.8), 0 0 24px rgba(255,107,0,0.4); }
  .logo-select {
    font-family:'Barlow'; font-size:10px; font-weight:700;
    letter-spacing:6px; color: var(--white);
    text-transform:uppercase; margin-top:-2px;
  }
  nav { display:flex; gap:6px; flex-wrap:nowrap; justify-content:flex-end; }
  .nav-btn {
    background:none; border:1px solid var(--border);
    color:var(--metal); padding:7px 12px; border-radius:20px;
    font-family:'Barlow'; font-size:11px; font-weight:600;
    letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .2s;
    white-space:nowrap;
  }
  .nav-btn:hover, .nav-btn.active {
    background:var(--electric); border-color:var(--electric);
    color:white; box-shadow:0 0 14px rgba(0,87,255,0.5);
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg,#050810 0%,#0D1A3A 50%,#050810 100%);
    padding:36px 24px 32px; text-align:center; position:relative; overflow:hidden;
  }
  @media(max-width:700px){
    .hero { padding-top:22px; padding-bottom:20px; }
    .hero h1 { font-size:clamp(42px,14vw,80px); letter-spacing:10px; }
  }
  .hero::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 25% 50%, rgba(0,87,255,0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 75% 50%, rgba(255,107,0,0.12) 0%, transparent 60%);
  }
  .hero h1 {
    font-family:'Bebas Neue'; font-size:clamp(52px,10vw,100px);
    letter-spacing:16px; line-height:1;
    background:linear-gradient(90deg,var(--sky),var(--white) 50%,var(--orange));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    position:relative; z-index:1;
  }

  /* FILTERS — por categoría de producto */
  .filters {
    max-width:1200px; margin:28px auto 0; padding:0 24px;
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  }
  .filter-label { font-size:11px; font-weight:700; letter-spacing:2px; color:var(--metal); text-transform:uppercase; margin-right:4px; }
  .filter-btn {
    background:rgba(13,22,40,0.8); border:1px solid var(--border);
    color:var(--metal); padding:7px 18px; border-radius:20px;
    font-family:'Barlow'; font-size:12px; font-weight:600;
    cursor:pointer; transition:all .2s; text-transform:uppercase; letter-spacing:1px;
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .filter-btn:hover { border-color:var(--sky); color:var(--sky); }
  .filter-btn.active { background:var(--sky); border-color:var(--sky); color:var(--dark); font-weight:700; }

  @media(max-width:700px){
    .filters { padding:0 16px; justify-content:center; }
    .filter-label { width:100%; text-align:center; margin-right:0; margin-bottom:2px; }
  }

  /* SEARCH */
  .search-row {
    max-width:1200px; margin:14px auto 0; padding:0 24px;
    display:flex; gap:12px; align-items:center;
  }
  .search-box { flex:1; position:relative; }
  .search-box input {
    width:100%; background:var(--card-bg); border:1px solid var(--border);
    color:var(--white); padding:11px 16px 11px 42px;
    border-radius:8px; font-family:'Barlow'; font-size:14px; outline:none; transition:border-color .2s;
  }
  .search-box input:focus { border-color:var(--sky); }
  .search-box input::placeholder { color:rgba(200,216,240,0.35); }
  .search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--metal); font-size:15px; }
  .count-badge {
    background:rgba(0,170,255,0.08); border:1px solid var(--border);
    color:var(--sky); font-size:12px; font-weight:600;
    padding:8px 16px; border-radius:8px; white-space:nowrap;
  }

  /* ADD PANEL */
  .add-panel { max-width:1200px; margin:18px auto 0; padding:0 24px; }
  .add-toggle {
    background:rgba(255,107,0,0.08); border:1px dashed rgba(255,107,0,0.35);
    color:var(--orange); width:100%; padding:12px;
    border-radius:8px; font-family:'Barlow'; font-size:12px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .add-toggle:hover { background:rgba(255,107,0,0.15); }
  .add-form {
    background:var(--card-bg); border:1px solid var(--border);
    border-radius:12px; padding:22px; margin-top:10px;
    display:none; grid-template-columns:1fr 1fr; gap:12px;
  }
  .add-form.open { display:grid; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  .form-group label { font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--metal); text-transform:uppercase; }
  .form-group input, .form-group select {
    background:rgba(5,8,16,0.8); border:1px solid var(--border);
    color:var(--white); padding:9px 12px; border-radius:6px;
    font-family:'Barlow'; font-size:14px; outline:none; transition:border-color .2s;
  }
  .form-group input:focus, .form-group select:focus { border-color:var(--sky); }
  .form-group select option { background:var(--dark); }
  .btn-add {
    grid-column:1/-1;
    background:linear-gradient(135deg,var(--electric),var(--sky));
    color:white; border:none; border-radius:8px; padding:12px;
    font-family:'Barlow'; font-size:14px; font-weight:700; letter-spacing:2px;
    text-transform:uppercase; cursor:pointer; transition:opacity .2s;
    box-shadow:0 4px 20px rgba(0,87,255,0.3);
  }
  .btn-add:hover { opacity:0.85; }

  /* GRID */
  .catalog-grid {
    max-width:1200px; margin:24px auto; padding:0 24px;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:20px;
  }
  @media(max-width:700px){
    .catalog-grid {
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:0 10px;
    }
  }

  /* CARD */
  .product-card {
    background:var(--card-bg); border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
    transition:transform .3s, border-color .3s, box-shadow .3s; cursor:pointer;
    animation:fadeIn .4s ease both;
  }
  .product-card:hover {
    transform:translateY(-5px); border-color:rgba(0,170,255,0.45);
    box-shadow:0 16px 44px rgba(0,87,255,0.22);
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .card-img {
    position:relative; height:220px; overflow:hidden;
    background:linear-gradient(135deg,#0D1628,#121E3A);
  }
  .card-img img { width:100%; height:100%; object-fit:contain; background:#f8f8f8; transition:transform .4s; padding: 8px; }
  .product-card:hover .card-img img { transform:scale(1.06); }
  .card-badge {
    position:absolute; top:8px; left:8px;
    background:var(--orange); color:white;
    font-size:10px; font-weight:700; letter-spacing:1px;
    padding:3px 8px; border-radius:4px; text-transform:uppercase;
    box-shadow:0 2px 8px rgba(255,107,0,0.4);
    line-height:1.2; display:inline-block;
    max-width:calc(50% - 4px); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card-cat {
    position:absolute; top:8px; right:8px;
    background:rgba(8,13,26,0.82); backdrop-filter:blur(8px);
    color:var(--sky); font-size:10px; font-weight:700;
    padding:3px 8px; border-radius:4px; letter-spacing:1px;
    text-transform:uppercase; border:1px solid rgba(0,170,255,0.25);
    line-height:1.2; display:inline-block;
    max-width:calc(50% - 4px); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  @media(max-width:700px){
    .card-img { height:150px; }
    .card-body { padding:8px 10px 10px; }
    .card-brand { font-size:9px; letter-spacing:1px; margin-bottom:2px; }
    .card-name { font-size:13px; margin-bottom:6px; line-height:1.25; }
    .card-price-row { gap:4px; margin-bottom:6px; flex-wrap:wrap; }
    .price-final { font-size:18px; }
    .price-original { font-size:11px; }
    .price-savings { font-size:9px; padding:1px 5px; }
    .card-footer { padding-top:7px; }
    .btn-whatsapp { font-size:10px; padding:7px 4px; letter-spacing:0.3px; gap:3px; }
    .card-badge {
      font-size:7px; padding:2px 5px; top:6px; left:6px;
    }
    .card-cat {
      font-size:7px; padding:2px 5px; top:6px; right:6px;
    }
  }
  .card-img-placeholder {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px;
  }
  .placeholder-icon { font-size:44px; opacity:0.25; }
  .placeholder-text { font-size:11px; color:var(--metal); opacity:0.4; letter-spacing:1px; }
  .card-body { padding:14px; }
  .card-brand { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--sky); text-transform:uppercase; margin-bottom:4px; }
  .card-name { font-family:'Barlow Condensed'; font-size:17px; font-weight:600; color:var(--white); line-height:1.3; margin-bottom:10px; }
  .card-price-row { display:flex; align-items:baseline; gap:8px; margin-bottom:10px; }
  .price-final { font-family:'Bebas Neue'; font-size:24px; color:var(--orange); letter-spacing:1px; }
  .price-original { font-size:13px; color:var(--metal); text-decoration:line-through; opacity:0.55; }
  .price-savings { font-size:11px; font-weight:700; color:#00E676; background:rgba(0,230,118,0.1); padding:2px 7px; border-radius:4px; }
  .card-footer {
    display:flex; gap:8px; align-items:center;
    border-top:1px solid var(--border); padding-top:10px; margin-top:4px;
  }
  .btn-whatsapp {
    flex:1; background:linear-gradient(135deg,#25D366,#128C7E);
    color:white; border:none; border-radius:6px;
    padding:9px; font-family:'Barlow'; font-size:12px; font-weight:700;
    cursor:pointer; transition:opacity .2s; letter-spacing:1px;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-whatsapp:hover { opacity:0.85; }
  .btn-info {
    background:rgba(0,170,255,0.08); border:1px solid rgba(0,170,255,0.25);
    color:var(--sky); border-radius:6px; padding:9px 11px;
    font-size:14px; cursor:pointer; transition:all .2s;
  }
  .btn-info:hover { background:rgba(0,170,255,0.18); }

  /* PAGINACIÓN — Load More */
  .pagination-wrap {
    max-width:1200px; margin:8px auto 40px; padding:0 24px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .page-info {
    font-size:12px; color:var(--metal); letter-spacing:1px; text-transform:uppercase;
  }
  .load-more-bar {
    width:100%; max-width:500px;
    background:rgba(0,170,255,0.06); border-radius:8px;
    height:4px; overflow:hidden; margin-bottom:2px;
  }
  .load-more-progress {
    height:100%; background:linear-gradient(90deg,var(--electric),var(--sky));
    border-radius:8px; transition:width .4s ease;
  }
  .btn-load-more {
    background:var(--card-bg); border:1px solid rgba(0,170,255,0.35);
    color:var(--sky); padding:13px 48px;
    border-radius:10px; font-family:'Barlow'; font-size:14px; font-weight:700;
    cursor:pointer; transition:all .25s; letter-spacing:1.5px; text-transform:uppercase;
  }
  .btn-load-more:hover { background:rgba(0,170,255,0.1); border-color:var(--sky); box-shadow:0 0 18px rgba(0,170,255,0.2); }

  /* GALERÍA */
  .gallery-wrap { position:relative; width:100%; height:100%; }
  .gallery-wrap img { width:100%; height:100%; object-fit:contain; background:#f8f8f8; padding:8px; transition:opacity .3s; }
  .gallery-nav {
    position:absolute; top:50%; transform:translateY(-50%);
    background:rgba(8,13,26,0.75); border:1px solid var(--border);
    color:white; width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:13px; z-index:10;
    transition:background .2s;
  }
  .gallery-nav:hover { background:var(--electric); }
  .gallery-prev { left:8px; }
  .gallery-next { right:8px; }
  .gallery-dots {
    position:absolute; bottom:7px; left:50%; transform:translateX(-50%);
    display:flex; gap:5px;
  }
  .gallery-dot {
    width:6px; height:6px; border-radius:50%;
    background:rgba(200,216,240,0.35); cursor:pointer; transition:background .2s;
  }
  .gallery-dot.active { background:var(--sky); }

  /* MODAL GALERÍA */
  .modal-img { height:280px; background:#f8f8f8; overflow:hidden; position:relative; }
  .modal-img img { width:100%; height:100%; object-fit:contain; padding:12px; transition:opacity .3s; }
  .modal-gallery-nav {
    position:absolute; top:50%; transform:translateY(-50%);
    background:rgba(8,13,26,0.75); border:1px solid var(--border);
    color:white; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px; z-index:10; transition:background .2s;
  }
  .modal-gallery-nav:hover { background:var(--electric); }
  .modal-gallery-prev { left:10px; }
  .modal-gallery-next { right:10px; }
  .modal-gallery-dots {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    display:flex; gap:6px;
  }
  .modal-gallery-dot {
    width:7px; height:7px; border-radius:50%;
    background:rgba(8,13,26,0.4); cursor:pointer; transition:background .2s; border:1px solid rgba(0,170,255,0.3);
  }
  .modal-gallery-dot.active { background:var(--sky); }
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(5,8,16,0.92); backdrop-filter:blur(10px);
    z-index:200; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal-wrap { position:relative; width:100%; max-width:1060px; }

  .modal {
    background:var(--card-bg); border:1px solid rgba(0,170,255,0.3);
    border-radius:20px; width:100%; overflow:hidden;
    box-shadow:0 32px 80px rgba(0,0,0,0.8);
    display:grid; grid-template-columns:1fr 1fr;
  }

  /* Imagen lado izquierdo */
  .modal-img {
    height:100%; min-height:380px; background:#f0f2f8;
    overflow:hidden; position:relative;
  }
  .modal-img img { width:100%; height:100%; object-fit:contain; padding:16px; transition:opacity .3s; }

  /* Contenido lado derecho */
  .modal-body {
    padding:28px 28px 24px;
    display:flex; flex-direction:column; gap:4px;
    border-left:1px solid var(--border);
  }
  .modal-brand { font-size:11px; font-weight:700; letter-spacing:2px; color:var(--sky); text-transform:uppercase; margin-bottom:2px; }
  .modal-name { font-family:'Barlow Condensed'; font-size:28px; font-weight:700; line-height:1.2; margin-bottom:8px; }
  .modal-divider { height:1px; background:var(--border); margin:6px 0; }
  .modal-desc { font-size:14px; color:var(--metal); line-height:1.7; flex:1; margin-bottom:8px; }
  .modal-price-row { display:flex; align-items:baseline; gap:10px; margin-bottom:20px; }
  .modal-price { font-family:'Bebas Neue'; font-size:30px; color:var(--orange); letter-spacing:1px; }
  .modal-price-orig { font-size:16px; color:var(--metal); text-decoration:line-through; opacity:0.55; }
  .modal-price-save { font-size:12px; font-weight:700; color:#00E676; background:rgba(0,230,118,0.1); padding:3px 9px; border-radius:5px; }
  .modal-actions { display:flex; flex-direction:column; gap:10px; margin-top:auto; }
  .btn-back {
    background:transparent; border:1px solid var(--border);
    color:var(--metal); border-radius:8px; padding:11px;
    font-family:'Barlow'; font-size:13px; font-weight:600;
    cursor:pointer; transition:all .2s; letter-spacing:1px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-back:hover { border-color:var(--sky); color:var(--sky); }

  .modal-close {
    position:absolute; top:14px; right:14px; z-index:10;
    background:rgba(8,13,26,0.85); border:1px solid var(--border);
    color:var(--metal); width:34px; height:34px; border-radius:50%;
    cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
    transition:all .2s;
  }
  .modal-close:hover { background:var(--electric); color:white; border-color:var(--electric); }

  /* MOBILE — modal pantalla completa */
  @media(max-width:700px){
    .modal-overlay {
      align-items:stretch;
      justify-content:stretch;
      padding:0;
      overflow:hidden;
    }
    .modal-wrap {
      max-width:100%;
      width:100%;
      height:100dvh;
      border-radius:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .modal {
      grid-template-columns:1fr;
      display:flex;
      flex-direction:column;
      border-radius:0;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      height:100dvh;
      border:none;
      border-radius:0 !important;
    }
    .modal-img {
      height:58vh;
      min-height:260px;
      max-height:480px;
      flex-shrink:0;
      border-left:none;
      border-bottom:1px solid var(--border);
    }
    .modal-body {
      padding:12px 16px 20px;
      border-left:none;
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .modal-brand { font-size:10px; margin-bottom:1px; }
    .modal-name { font-size:17px; margin-bottom:4px; line-height:1.2; }
    .modal-divider { margin:4px 0; }
    .modal-desc { font-size:13px; line-height:1.5; margin-bottom:6px; }
    .modal-price-row { margin-bottom:0; }
    .modal-price { font-size:24px; }
    .modal-price-orig { font-size:13px; }
    .modal-price-save { font-size:11px; }
    .modal-actions { margin-top:10px; }
    .modal-close {
      top:12px; right:12px;
      background:rgba(8,13,26,0.95);
      border-color:rgba(0,170,255,0.4);
      z-index:20;
    }
  }

  /* SCROLL TO TOP */
  .scroll-top {
    position:fixed; bottom:28px; right:24px; z-index:150;
    width:52px; height:52px; border-radius:50%;
    background:var(--orange);
    border:none;
    color:white;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 24px rgba(255,107,0,0.55), 0 0 0 3px rgba(255,107,0,0.15);
    opacity:0; pointer-events:none;
    transform:translateY(14px);
    transition:opacity .3s, transform .3s, box-shadow .2s;
  }
  .scroll-top.visible { opacity:1; pointer-events:auto; transform:translateY(0); }
  .scroll-top:hover { background:#ff8c2a; box-shadow:0 8px 32px rgba(255,107,0,0.65), 0 0 0 4px rgba(255,107,0,0.2); transform:translateY(-3px); }
  .scroll-top svg { width:26px; height:26px; stroke:white; stroke-width:3; fill:none; stroke-linecap:round; stroke-linejoin:round; }

  /* FOOTER */
  footer {

</style>
</head>
<body>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">

<script>
// =============================================
// 🔧 CONFIGURACIÓN
// =============================================
const WA_NUMBER = '50688417429';

const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHSqLmTK1qaRJMz9Fgril-XAoP-QJxkAwprBbGn10BVlSrm--sRJLdUZUMHFDUO-hFCsgaNnpuuBWP/pub?gid=0&single=true&output=csv';

let products = [];
let nextId = 1;
let activeNav = 'all';
let activeFilter = '';
let currentProduct = null;

// =============================================
// 📥 CARGAR PRODUCTOS DESDE GOOGLE SHEETS
// =============================================
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  // skip header row (row 0)
  return lines.slice(1).map((line, i) => {
    // handle commas inside quoted fields
    const cols = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    const [nombre, marca, categoria, genero, precio_original, precio_final, badge, imagen, descripcion] = cols;
    if (!nombre) return null;
    return {
      id: i + 1,
      name: nombre || '',
      brand: marca || '',
      cat: categoria || 'Calzado',
      gender: (genero || 'all').toLowerCase(),
      original: parseFloat(precio_original) || 0,
      final: parseFloat(precio_final) || 0,
      badge: badge || '',
      img: imagen || '',
      desc: descripcion || ''
    };
  }).filter(Boolean);
}

function showLoading(on) {
  document.getElementById('loadingState').style.display = on ? 'flex' : 'none';
  document.getElementById('grid').style.display = on ? 'none' : 'grid';
}

async function loadFromSheet() {
  showLoading(true);
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    products = parseCSV(text);
    nextId = products.length + 1;
    showLoading(false);
    if (products.length === 0) {
      document.getElementById('grid').style.display = 'grid';
      document.getElementById('grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--metal)"><div style="font-size:50px;margin-bottom:16px">📋</div><div style="letter-spacing:1px">Tu Google Sheet está vacío.<br>Agrega productos en el Sheet para verlos aquí.</div></div>';
      document.getElementById('countBadge').textContent = '0 productos';
      return;
    }
    renderCards();
  } catch(e) {
    showLoading(false);
    document.getElementById('grid').style.display = 'grid';
    document.getElementById('grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--metal)"><div style="font-size:50px;margin-bottom:16px">⚠️</div><div>Error al cargar productos. Verifica la conexión.</div></div>';
  }
}

function setNav(btn, val) {
  activeNav = val;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function setFilter(btn, val) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function toggleForm() {
  document.getElementById('addForm').classList.toggle('open');
}
function addProduct() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('Ingresa el nombre del producto'); return; }
  products.unshift({
    id: nextId++, name,
    brand: document.getElementById('fBrand').value.trim(),
    cat: document.getElementById('fCat').value,
    gender: document.getElementById('fGender').value,
    original: parseFloat(document.getElementById('fOriginal').value) || 0,
    final: parseFloat(document.getElementById('fFinal').value) || 0,
    badge: document.getElementById('fBadge').value.trim(),
    img: document.getElementById('fImg').value.trim(),
    desc: document.getElementById('fDesc').value.trim()
  });
  ['fName','fBrand','fBadge','fImg','fDesc','fOriginal','fFinal'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addForm').classList.remove('open');
  renderCards();
}
function savings(orig, fin) {
  if (!orig || !fin || orig <= fin) return '';
  return '-' + Math.round((1 - fin/orig)*100) + '%';
}
const catIcons = { Calzado:'👟', Ropa:'👕', Carteras:'👜', Relojes:'⌚', Accesorios:'💍', Lentes:'🕶️', Perfumes:'🌸' };
const PAGE_SIZE = 20;
let currentPage = 1;
let filteredList = [];

function renderCards() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  filteredList = products.filter(p => {
    const gOk = activeNav === 'all' || p.gender === activeNav || p.gender === 'all' || (activeNav === 'kids' && (p.gender === 'kids' || p.gender === 'infantil'));
    const cOk = !activeFilter || p.cat === activeFilter;
    const sOk = !search || p.name.toLowerCase().includes(search) || (p.brand||'').toLowerCase().includes(search) || (p.cat||'').toLowerCase().includes(search);
    return gOk && cOk && sOk;
  });
  currentPage = 1;
  renderPage();
}

function renderPage() {
  const total = filteredList.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filteredList.slice(start, start + PAGE_SIZE);

  document.getElementById('countBadge').textContent = total + ' producto' + (total !== 1 ? 's' : '');
  const grid = document.getElementById('grid');

  if (!total) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--metal)"><div style="font-size:50px;margin-bottom:16px">🔍</div><div style="letter-spacing:1px">No hay productos en esta categoría</div></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  grid.innerHTML = pageItems.map((p,i) => {
    const imgs = p.img ? p.img.split('|').map(s=>s.trim()).filter(Boolean) : [];
    const firstImg = imgs[0] || '';
    const multi = imgs.length > 1;
    return `
    <div class="product-card" style="animation-delay:${i*0.05}s">
      <div class="card-img">
        ${firstImg ? `
          <div class="gallery-wrap">
            <img id="cimg-${p.id}" src="${firstImg}" alt="${p.name}" onerror="this.style.display='none'" onclick="openModal(${p.id})" style="cursor:pointer">
            ${multi ? `
              <button class="gallery-nav gallery-prev" onclick="event.stopPropagation();cardGallery(${p.id},-1,${JSON.stringify(imgs).replace(/"/g,'&quot;')})">‹</button>
              <button class="gallery-nav gallery-next" onclick="event.stopPropagation();cardGallery(${p.id},1,${JSON.stringify(imgs).replace(/"/g,'&quot;')})">›</button>
              <div class="gallery-dots" id="cdots-${p.id}">
                ${imgs.map((_,di)=>`<div class="gallery-dot${di===0?' active':''}" onclick="event.stopPropagation();cardGalleryGo(${p.id},${di},${JSON.stringify(imgs).replace(/"/g,'&quot;')})"></div>`).join('')}
              </div>
            ` : ''}
          </div>
        ` : `
          <div class="card-img-placeholder" onclick="openModal(${p.id})" style="cursor:pointer">
            <div class="placeholder-icon">${catIcons[p.cat]||'🛍️'}</div>
            <div class="placeholder-text">Sin imagen</div>
          </div>
        `}
        ${p.badge ? `<div class="card-badge">${p.badge}</div>` : ''}
        <div class="card-cat">${catIcons[p.cat]||''} ${p.cat}</div>
      </div>
      <div class="card-body">
        <div class="card-brand">${p.brand||''}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-price-row">
          <div class="price-final">₡${p.final||'—'}</div>
          ${p.original && p.original > p.final ? `<div class="price-original">₡${p.original}</div>` : ''}
          ${savings(p.original,p.final) ? `<div class="price-savings">${savings(p.original,p.final)}</div>` : ''}
        </div>
        <div class="card-footer">
          <button class="btn-whatsapp" onclick="event.stopPropagation();whatsApp(${p.id})">📲 Consultar talla y disponibilidad</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // ── Load More ──
  const pagination = document.getElementById('pagination');
  const visibleCount = currentPage * PAGE_SIZE;
  const showing = Math.min(visibleCount, total);
  const pct = Math.round((showing / total) * 100);

  if (visibleCount >= total) {
    pagination.innerHTML = total > PAGE_SIZE
      ? `<div class="page-info">Has visto los ${total} productos</div>`
      : '';
    return;
  }

  pagination.innerHTML = `
    <div class="page-info">Has visto ${showing} de ${total} productos</div>
    <div class="load-more-bar"><div class="load-more-progress" style="width:${pct}%"></div></div>
    <button class="btn-load-more" onclick="loadMore()">Cargar más</button>`;
}

function loadMore() {
  currentPage++;
  const total = filteredList.length;
  const start = 0;
  const pageItems = filteredList.slice(0, currentPage * PAGE_SIZE);
  const grid = document.getElementById('grid');

  // Agregar solo los nuevos items al grid existente
  const newItems = filteredList.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
  newItems.forEach((p, i) => {
    const div = document.createElement('div');
    const imgs = p.img ? p.img.split('|').map(s=>s.trim()).filter(Boolean) : [];
    const firstImg = imgs[0] || '';
    const multi = imgs.length > 1;
    div.innerHTML = `
    <div class="product-card" style="animation-delay:${i*0.05}s">
      <div class="card-img">
        ${firstImg ? `
          <div class="gallery-wrap">
            <img id="cimg-${p.id}" src="${firstImg}" alt="${p.name}" onerror="this.style.display='none'" onclick="openModal(${p.id})" style="cursor:pointer">
            ${multi ? `
              <button class="gallery-nav gallery-prev" onclick="event.stopPropagation();cardGallery(${p.id},-1,${JSON.stringify(imgs).replace(/"/g,'&quot;')})">‹</button>
              <button class="gallery-nav gallery-next" onclick="event.stopPropagation();cardGallery(${p.id},1,${JSON.stringify(imgs).replace(/"/g,'&quot;')})">›</button>
              <div class="gallery-dots" id="cdots-${p.id}">
                ${imgs.map((_,di)=>`<div class="gallery-dot${di===0?' active':''}" onclick="event.stopPropagation();cardGalleryGo(${p.id},${di},${JSON.stringify(imgs).replace(/"/g,'&quot;')})"></div>`).join('')}
              </div>
            ` : ''}
          </div>
        ` : `
          <div class="card-img-placeholder" onclick="openModal(${p.id})" style="cursor:pointer">
            <div class="placeholder-icon">${catIcons[p.cat]||'🛍️'}</div>
            <div class="placeholder-text">Sin imagen</div>
          </div>
        `}
        ${p.badge ? `<div class="card-badge">${p.badge}</div>` : ''}
        <div class="card-cat">${catIcons[p.cat]||''} ${p.cat}</div>
      </div>
      <div class="card-body">
        <div class="card-brand">${p.brand||''}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-price-row">
          <div class="price-final">₡${p.final||'—'}</div>
          ${p.original && p.original > p.final ? `<div class="price-original">₡${p.original}</div>` : ''}
          ${savings(p.original,p.final) ? `<div class="price-savings">${savings(p.original,p.final)}</div>` : ''}
        </div>
        <div class="card-footer">
          <button class="btn-whatsapp" onclick="event.stopPropagation();whatsApp(${p.id})">📲 Consultar talla y disponibilidad</button>
        </div>
      </div>
    </div>`;
    grid.appendChild(div.firstElementChild);
  });

  // Actualizar botón Load More
  const showing = Math.min(currentPage * PAGE_SIZE, total);
  const pct = Math.round((showing / total) * 100);
  const pagination = document.getElementById('pagination');
  if (currentPage * PAGE_SIZE >= total) {
    pagination.innerHTML = `<div class="page-info">Has visto los ${total} productos</div>`;
  } else {
    pagination.innerHTML = `
      <div class="page-info">Has visto ${showing} de ${total} productos</div>
      <div class="load-more-bar"><div class="load-more-progress" style="width:${pct}%"></div></div>
      <button class="btn-load-more" onclick="loadMore()">Cargar más</button>`;
  }
}

function goPage(page) {
  const totalPages = Math.ceil(filteredList.length / PAGE_SIZE);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderPage();
}
const cardGalleryState = {};
function cardGallery(id, dir, imgs) {
  const state = cardGalleryState[id] || { idx: 0 };
  state.idx = (state.idx + dir + imgs.length) % imgs.length;
  cardGalleryState[id] = state;
  _updateCardImg(id, state.idx, imgs);
}
function cardGalleryGo(id, idx, imgs) {
  cardGalleryState[id] = { idx };
  _updateCardImg(id, idx, imgs);
}
function _updateCardImg(id, idx, imgs) {
  const img = document.getElementById('cimg-' + id);
  if (img) img.src = imgs[idx];
  const dots = document.querySelectorAll(`#cdots-${id} .gallery-dot`);
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
}

// ── Modal gallery ──
let modalImgs = [], modalIdx = 0;
function openModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  currentProduct = p;
  modalImgs = p.img ? p.img.split('|').map(s=>s.trim()).filter(Boolean) : [];
  modalIdx = 0;
  _updateModalImg();
  document.getElementById('mBrand').textContent = (p.brand||'') + ' · ' + (catIcons[p.cat]||'') + ' ' + p.cat;
  document.getElementById('mName').textContent = p.name;
  document.getElementById('mDesc').textContent = p.desc || 'Consultar disponibilidad de tallas y colores.';
  document.getElementById('mPrice').textContent = '₡' + (p.final || p.original || '—');
  document.getElementById('mPriceOrig').textContent = (p.original && p.original > p.final) ? '₡' + p.original : '';
  document.getElementById('mPriceSave').textContent = savings(p.original, p.final) || '';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function _updateModalImg() {
  const img = document.getElementById('mImg');
  const prev = document.getElementById('mPrev');
  const next = document.getElementById('mNext');
  const dotsWrap = document.getElementById('mDots');
  const multi = modalImgs.length > 1;
  if (modalImgs.length > 0) {
    img.src = modalImgs[modalIdx];
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }
  prev.style.display = multi ? 'flex' : 'none';
  next.style.display = multi ? 'flex' : 'none';
  dotsWrap.innerHTML = multi ? modalImgs.map((_,i) =>
    `<div class="modal-gallery-dot${i===modalIdx?' active':''}" onclick="modalGalleryGo(${i})"></div>`
  ).join('') : '';
}
function modalGalleryNav(dir) {
  modalIdx = (modalIdx + dir + modalImgs.length) % modalImgs.length;
  _updateModalImg();
}
function modalGalleryGo(idx) {
  modalIdx = idx;
  _updateModalImg();
}
function closeModal(e) {
  if(e.target.id==='modal') {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }
}
function closeModalBtn() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
function whatsApp(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const msg = encodeURIComponent(`¡Hola KJ Select! 👋 Me interesa: *${p.name}* (${p.brand}) — ₡${p.final}. ¿Está disponible?`);
  window.open('https://wa.me/' + WA_NUMBER + '?text=' + msg, '_blank');
}
function sendWhatsApp() { if(currentProduct) whatsApp(currentProduct.id); }

// Atajo secreto: Ctrl + Shift + A para mostrar panel admin
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === 'A') {
    const panel = document.getElementById('adminPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  }
});

// Scroll to top button
window.addEventListener('scroll', function() {
  const btn = document.getElementById('scrollTopBtn');
  if (window.scrollY > 400) btn.classList.add('visible');
  else btn.classList.remove('visible');
});

// Cargar al iniciar
loadFromSheet();
</script>
